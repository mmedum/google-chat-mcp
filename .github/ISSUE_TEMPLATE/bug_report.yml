name: Bug report
description: Something in google-chat-mcp isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. For **security issues**
        (token leak, auth bypass, etc.) do not open a public issue — follow
        `SECURITY.md` instead.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `google-chat-mcp --version` or the image tag you're running.
      placeholder: "0.2.0 (or ghcr.io/mmedum/google-chat-mcp:0.2.0)"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - HTTPS (Docker)
        - both
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, what you saw instead.
      placeholder: |
        Steps to reproduce:
        1.
        2.
        Expected:
        Actual:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste the failing tool call's JSON-RPC error (if applicable) and/or
        server-side stderr around the timestamp. Redact tokens and emails.
      render: text

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I've redacted any tokens, secrets, or personal info from logs.
          required: true
        - label: I've searched existing issues for duplicates.
          required: true
