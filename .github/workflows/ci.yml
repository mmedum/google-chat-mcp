name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # setup-uv v8 dropped moving major/minor tags for supply-chain safety;
      # pin to an exact patch.
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Sync
        run: uv sync --frozen --extra dev
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format)
        run: uv run ruff format --check .
      - name: ty (type check)
        run: uv run ty check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Sync
        run: uv sync --frozen --extra dev
      - name: Pytest
        run: uv run pytest --cov-fail-under=80

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Sync
        run: uv sync --frozen --extra dev
      # Audit the exported lockfile rather than the environment so pip-audit
      # doesn't try (and fail) to resolve `google-chat-mcp` itself on PyPI.
      # `--no-emit-project` drops the self-package from the export.
      # CVE-2025-69872 ignored per project risk assessment; revisit on upstream fix.
      - name: pip-audit
        run: |
          uv export --format requirements-txt --no-emit-project --no-hashes -q \
            | uv run pip-audit --strict -r /dev/stdin --ignore-vuln CVE-2025-69872

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: google-chat-mcp:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          # Pin the Trivy CLI explicitly; trivy-action v0.35.0 bundles 0.69.3
          # and nags about newer releases in its scan output. Bump when a
          # newer version ships.
          version: v0.70.0
          image-ref: google-chat-mcp:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
