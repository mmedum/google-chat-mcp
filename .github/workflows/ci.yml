name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # dorny/paths-filter calls the GitHub API on pull_request events to enumerate
  # changed files; requires PR-metadata read access in addition to contents.
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          # Positive allowlist: `code == 'true'` if any changed file is on the
          # project's build/test surface. Pure docs PRs (only .md or docs/**)
          # leave `code == 'false'` and skip the expensive jobs below.
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'migrations/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile'
              - '.dockerignore'
              - '.hadolint.yaml'
              - '.pre-commit-config.yaml'
              - '.github/workflows/**'
              - '.python-version'

  lint-and-type:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Sync
        run: uv sync --frozen --extra dev
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format)
        run: uv run ruff format --check .
      - name: ty (type check)
        run: uv run ty check
      - name: Lint workflows
        uses: raven-actions/actionlint@3a24062651993d40fed1019b58ac6fbdfbf276cc  # v2.0.1
        with:
          matcher: true
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

  test:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Sync
        run: uv sync --frozen --extra dev
      - name: Pytest
        run: uv run pytest --cov-fail-under=80

  audit:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Sync
        run: uv sync --frozen --extra dev
      # Audit the exported lockfile rather than the environment so pip-audit
      # doesn't try (and fail) to resolve `google-chat-mcp` itself on PyPI.
      # `--no-emit-project` drops the self-package from the export.
      # CVE-2025-69872 ignored per project risk assessment; revisit on upstream fix.
      - name: pip-audit
        run: |
          uv export --format requirements-txt --no-emit-project --no-hashes -q \
            | uv run pip-audit --strict -r /dev/stdin --ignore-vuln CVE-2025-69872

  container:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          tags: google-chat-mcp:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          # Pin the Trivy CLI explicitly; the action's bundled 0.69.3 nags
          # about newer releases in scan output. Bump when a newer ships.
          version: v0.70.0
          image-ref: google-chat-mcp:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
