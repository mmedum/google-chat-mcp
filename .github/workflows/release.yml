name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write       # gh release create
  packages: write       # GHCR push
  id-token: write       # OIDC for Sigstore provenance attestations
  attestations: write   # provenance/SBOM attestations on the image

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        env:
          # Emit OCI annotations for both the per-arch manifests and the
          # multi-arch index. GHCR reads the package description from the
          # index's `org.opencontainers.image.description` annotation; without
          # this, only per-arch labels are produced and the package page has
          # no description.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ghcr.io/${{ github.repository }}
          # `latest` is gated on the default branch so a patch release on an
          # older line doesn't steal the pointer.
          # docker/metadata-action auto-derives the standard OCI labels
          # (source, licenses, description, title, revision, version, url,
          # created) from the GitHub repo context — no need to restate.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # metadata-action's {{version}} strips the leading `v`, so this
          # matches the hatch-vcs-expected semver (`0.2.0` for tag `v0.2.0`).
          build-args: |
            PACKAGE_VERSION=${{ steps.meta.outputs.version }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false
      - name: Extract CHANGELOG section for this tag
        # Walk from `## [X.Y.Z]` until the next release header OR the
        # compare-link footer — covers both mid-file and last-entry cases.
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && (/^## \[/ || /^\[[^]]+\]: /) { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG section found for ${version}"
            exit 1
          fi
          echo "--- release notes ---"
          cat /tmp/release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            --title "$GITHUB_REF_NAME" \
            --verify-tag
