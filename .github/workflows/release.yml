name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write       # gh release create
  packages: write       # GHCR push
  id-token: write       # OIDC for Sigstore provenance attestations
  attestations: write   # provenance/SBOM attestations on the image

jobs:
  # One job per arch on a native runner (no QEMU). Each pushes by digest
  # only — the `docker-merge` job below assembles the manifest list and
  # applies the semver tags.
  docker-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64, runner: ubuntu-latest,    id: linux-amd64 }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm, id: linux-arm64 }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
      - id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # metadata-action's {{version}} strips the leading `v`, so this
          # matches the hatch-vcs-expected semver (`0.2.0` for tag `v0.2.0`).
          build-args: |
            PACKAGE_VERSION=${{ steps.meta.outputs.version }}
          provenance: mode=max
          sbom: true
          # Push the per-arch image by digest only; the merge job tags the
          # manifest list with semver tags. Per-arch cache-scope keeps the
          # two platforms' caches separate.
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,scope=${{ matrix.id }},mode=max
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digests-${{ matrix.id }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  # Combine the per-arch digests into a multi-arch index, apply the semver
  # tags + OCI annotations, then push. Index annotations are what GHCR
  # reads for the package description; per-arch manifest annotations are
  # nice-to-have.
  docker-merge:
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        env:
          # Emit annotations at both per-manifest and index level; GHCR
          # reads the description from the index annotations.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          METADATA: ${{ steps.meta.outputs.json }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          # Build `-t` + `--annotation` + source-digest args via bash arrays
          # so whitespace in annotation values can't break the command.
          tag_args=()
          while IFS= read -r tag; do
            tag_args+=(-t "$tag")
          done < <(jq -r '.tags[]' <<< "$METADATA")

          ann_args=()
          while IFS= read -r ann; do
            ann_args+=(--annotation "$ann")
          done < <(jq -r '.annotations[]' <<< "$METADATA")

          src_args=()
          for digest in *; do
            src_args+=("${IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${ann_args[@]}" "${src_args[@]}"
      - name: Inspect published image
        env:
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${{ steps.meta.outputs.version }}"

  release:
    needs: docker-merge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false
      - name: Extract CHANGELOG section for this tag
        # Walk from `## [X.Y.Z]` until the next release header OR the
        # compare-link footer — covers both mid-file and last-entry cases.
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && (/^## \[/ || /^\[[^]]+\]: /) { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG section found for ${version}"
            exit 1
          fi
          echo "--- release notes ---"
          cat /tmp/release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            --title "$GITHUB_REF_NAME" \
            --verify-tag
