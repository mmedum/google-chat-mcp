name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write       # gh release create
  packages: write       # GHCR push
  id-token: write       # OIDC for Sigstore provenance attestations
  attestations: write   # provenance/SBOM attestations on the image

jobs:
  # One job per arch on a native runner (`ubuntu-24.04-arm` for arm64) to
  # skip QEMU emulation on the project-install layer. Each leg pushes by
  # digest only; `docker-merge` below assembles the manifest list and
  # applies the semver tags.
  docker-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64, runner: ubuntu-latest,    id: linux-amd64 }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm, id: linux-arm64 }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute package version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            PACKAGE_VERSION=${{ steps.ver.outputs.version }}
          provenance: mode=max
          sbom: true
          # Per-arch push by digest; the merge job applies semver tags to
          # the manifest list. Per-arch cache scope keeps the two
          # platforms' caches independent.
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,scope=${{ matrix.id }},mode=max
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digests-${{ matrix.id }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  docker-merge:
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        env:
          # Index-only: `docker buildx imagetools create` doesn't accept
          # `--annotation manifest:...` (per-arch manifests are already
          # written by the build jobs; merge can't mutate them). GHCR
          # reads the description from the index annotation anyway, so
          # `index` is the level that matters.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          METADATA: ${{ steps.meta.outputs.json }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          # Build `-t` + `--annotation` + source-digest args via bash arrays
          # so whitespace in annotation values can't break the command.
          tag_args=()
          while IFS= read -r tag; do
            tag_args+=(-t "$tag")
          done < <(jq -r '.tags[]' <<< "$METADATA")

          ann_args=()
          while IFS= read -r ann; do
            ann_args+=(--annotation "$ann")
          done < <(jq -r '.annotations[]' <<< "$METADATA")

          src_args=()
          for digest in *; do
            src_args+=("${IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${ann_args[@]}" "${src_args[@]}"
      - name: Verify attestations landed on the index
        # Referrer-following on `imagetools create` preserves the per-arch
        # SBOM + provenance manifests into the merged index. If buildx or the
        # runner image ever regresses, the image would ship without
        # attestations and `provenance: mode=max` + `sbom: true` above would
        # be silently no-op. One guard per arch (amd64, arm64 → 2 expected).
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          raw=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --raw)
          echo "$raw" | jq .
          count=$(jq '[.manifests[] | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")] | length' <<< "$raw")
          if [ "$count" -lt 2 ]; then
            echo "::error::Expected ≥2 attestation manifests on the index; got $count"
            exit 1
          fi
          echo "Attestation manifests present: $count"

  release:
    needs: docker-merge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false
      - name: Extract CHANGELOG section for this tag
        # Walk from `## [X.Y.Z]` until the next release header OR the
        # compare-link footer — covers both mid-file and last-entry cases.
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && (/^## \[/ || /^\[[^]]+\]: /) { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG section found for ${version}"
            exit 1
          fi
          echo "--- release notes ---"
          cat /tmp/release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            --title "$GITHUB_REF_NAME" \
            --verify-tag

  pypi-publish:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Binds this job to the `pypi` GitHub Environment so the configured
    # trusted-publisher on pypi.org recognizes the OIDC token, and (if
    # enabled on the environment) required reviewers gate the publish.
    environment:
      name: pypi
      url: https://pypi.org/p/google-chat-mcp
    permissions:
      id-token: write     # OIDC token for PyPI Trusted Publishing
      contents: read
      attestations: write # PEP 740 attestations generated by the publish action
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # hatch-vcs reads the version from git tags; a shallow clone
          # would yield a dev-suffixed version that PyPI would reject.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - name: Build sdist and wheel
        run: uv build
      - name: Publish to PyPI
        # `release/v1` is the PyPA-recommended pinning strategy for this
        # action specifically — it's a protected branch the maintainers
        # keep pointing at the latest tagged release.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
