name: release

on:
  push:
    tags: ['v*.*.*']

# Minimal-scope permissions; GITHUB_TOKEN is enough for GHCR + releases +
# Sigstore attestations via OIDC — no PAT, no extra secrets.
permissions:
  contents: write       # gh release create
  packages: write       # GHCR push
  id-token: write       # OIDC for Sigstore provenance attestations
  attestations: write   # provenance/SBOM attestations on the image

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # hatch-vcs reads git tags at build time
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          # Emit version + major.minor + latest for v-prefixed semver tags.
          # `latest` only moves when the tag is on the default branch, so a
          # patch-release for an older line doesn't steal the pointer.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=MCP server exposing Google Chat to MCP-compatible clients
      - id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Feed the tag-derived version to hatch-vcs inside the container;
          # the .git/ dir isn't in the Docker build context so VCS detection
          # can't run at build time. metadata-action's {{version}} strips
          # the leading `v` so this matches the git tag value (`0.2.0`).
          build-args: |
            PACKAGE_VERSION=${{ steps.meta.outputs.version }}
          # Attestations: public repos auto-get provenance mode=max; setting
          # it explicitly makes the workflow self-documenting. sbom=true
          # generates an SPDX SBOM alongside the image manifest.
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Extract CHANGELOG section for this tag
        # Pulls the `## [X.Y.Z]` block out of CHANGELOG.md. Using a flag-based
        # walk rather than awk's /start/,/end/ range operator because the range
        # form matches the opening line on both ends (the header is itself a
        # `## [` line), which collapses the output to a single line.
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG section found for ${version}"
            exit 1
          fi
          echo "--- release notes ---"
          cat /tmp/release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            --title "$GITHUB_REF_NAME" \
            --verify-tag
