services:
  mcp:
    # `:0.2` floats within the 0.2.x patch line — pin to `:0.2.0` for
    # strict reproducibility, or use `:latest` to follow the default branch.
    # For local dev builds, swap to the commented `build:` block below.
    image: ghcr.io/mmedum/google-chat-mcp:0.2
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GCM_BASE_URL: "${GCM_BASE_URL:?set to https://<your-host> — the public URL of this MCP server}"
      GCM_DATA_DIR: "/var/lib/google-chat-mcp"
      GCM_LOG_LEVEL: "${GCM_LOG_LEVEL:-INFO}"
      # Client redirect whitelist — set to your MCP client's OAuth callback URL.
      GCM_ALLOWED_CLIENT_REDIRECTS: "${GCM_ALLOWED_CLIENT_REDIRECTS:?set to your MCP client's callback URL(s), CSV}"
      GCM_RATE_LIMIT_PER_MINUTE: "${GCM_RATE_LIMIT_PER_MINUTE:-60}"
      # Disable FastMCP's boot-time pypi version check: it adds a network dep
      # to startup and leaks deployment timing via pypi.org access logs.
      FASTMCP_CHECK_FOR_UPDATES: "off"
    secrets:
      - GCM_google_client_id
      - GCM_google_client_secret
      - GCM_fernet_key
      - GCM_jwt_signing_key
      - GCM_audit_pepper
    volumes:
      - mcp_data:/var/lib/google-chat-mcp
    mem_limit: 512m
    cpus: 1.0
    user: "1000:1000"
    read_only: false  # SQLite + key-value store write to /var/lib/google-chat-mcp
    security_opt:
      - no-new-privileges:true

secrets:
  # pydantic-settings applies `env_prefix="GCM_"` to `secrets_dir` lookups,
  # so the mount path inside the container must be `/run/secrets/GCM_<name>`
  # even though the host-side file keeps the bare name documented in README.
  GCM_google_client_id:
    file: ./secrets/google_client_id
  GCM_google_client_secret:
    file: ./secrets/google_client_secret
  GCM_fernet_key:
    file: ./secrets/fernet_key
  GCM_jwt_signing_key:
    file: ./secrets/jwt_signing_key
  GCM_audit_pepper:
    file: ./secrets/audit_pepper

volumes:
  mcp_data:
    driver: local
